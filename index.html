<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>ClochardCoin | Mat Clochard Live System</title>

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top, rgba(255, 204, 51, 0.16), transparent 34%),
        radial-gradient(circle at bottom, rgba(227, 34, 34, 0.26), transparent 42%),
        #050505;
      color: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      text-align: center;
      overflow-x: hidden;
    }

    .card {
      width: 100%;
      max-width: 470px;
      border: 1px solid rgba(255, 204, 51, 0.38);
      background: rgba(8, 8, 8, 0.92);
      border-radius: 26px;
      padding: 26px 20px;
      box-shadow: 0 0 45px rgba(227, 34, 34, 0.18);
    }

    .logo {
      width: 150px;
      max-width: 70%;
      margin: 0 auto 18px;
      display: block;
      object-fit: contain;
      filter: drop-shadow(0 0 18px rgba(255, 204, 51, 0.22));
    }

    .tag {
      color: #ffcc33;
      letter-spacing: 2px;
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 10px;
    }

    h1 {
      margin: 0;
      font-size: 32px;
      line-height: 1.05;
      color: #fff;
    }

    h1 span {
      color: #e32222;
    }

    .subtitle {
      margin: 14px 0 22px;
      color: #d2d2d2;
      line-height: 1.45;
      font-size: 15px;
    }

    .ticker {
      width: 100%;
      overflow: hidden;
      border: 1px solid rgba(255, 204, 51, 0.35);
      background: #090909;
      border-radius: 14px;
      margin: 0 0 22px;
      padding: 10px 0;
      white-space: nowrap;
    }

    .ticker-track {
      display: inline-block;
      padding-left: 100%;
      animation: ticker 24s linear infinite;
      font-family: monospace;
      font-size: 13px;
      color: #ffcc33;
    }

    @keyframes ticker {
      from { transform: translateX(0); }
      to { transform: translateX(-100%); }
    }

    .terminal-line {
      text-align: left;
      background: #090909;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      margin-bottom: 22px;
      color: #d8d8d8;
      font-family: monospace;
      font-size: 13px;
      line-height: 1.55;
    }

    .terminal-line strong {
      color: #ffcc33;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 16px;
      margin: 12px 0;
      border-radius: 16px;
      text-decoration: none;
      font-weight: 900;
      color: #050505;
      background: #ffcc33;
      border: 1px solid #ffcc33;
      letter-spacing: 0.4px;
    }

    .btn.secondary {
      color: #fff;
      background: transparent;
      border-color: rgba(255,255,255,0.28);
    }

    .btn.danger {
      color: #ffcc33;
      background: rgba(227,34,34,0.12);
      border-color: rgba(227,34,34,0.55);
    }

    .footer {
      margin-top: 18px;
      font-size: 12px;
      color: #
