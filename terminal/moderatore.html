<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderatore Mat Clochard</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="background-stars"></div>
  <div class="background-glow"></div>

  <main class="page">
    <header class="hero">
      <p class="domain">terminal.clochardcoin.it/moderatore</p>
      <h1>MODERATORE MAT</h1>
      <p class="subtitle">Gestisci la live, programma i log e modera i comandi della community.</p>
    </header>

    <section class="terminal-card">
      <div class="terminal-top">
        <div class="dots"><span></span><span></span><span></span></div>
        <p>/mat_clochard/control_panel</p>
      </div>

      <div class="command-form" id="loginBox">
        <label for="adminPassword">Password moderatore</label>
        <input id="adminPassword" type="password" placeholder="Inserisci password" />
        <button id="loginBtn" type="button">Entra</button>

        <p class="local-note">
          Pannello riservato alla gestione della live ClochardCoin.
        </p>
      </div>

      <div class="command-form hidden" id="moderationBox">
        <h2>Config live</h2>

        <label for="liveDate">Data live programmata</label>
        <input id="liveDate" type="date" />

        <label for="dailyObjective">Obiettivo del giorno</label>
        <input id="dailyObjective" type="text" placeholder="Es. Continuare a costruire" />

        <label for="instagramFollowers">Follower Instagram</label>
        <input id="instagramFollowers" type="number" placeholder="141" />

        <label for="telegramFollowers">Follower Telegram</label>
        <input id="telegramFollowers" type="number" placeholder="7" />

        <label for="tiktokFollowers">Follower TikTok</label>
        <input id="tiktokFollowers" type="number" placeholder="3" />

        <h2>Log programmati</h2>

        <label for="log06">Log ore 06</label>
        <textarea id="log06" rows="3"></textarea>

        <label for="log09">Log ore 09</label>
        <textarea id="log09" rows="3"></textarea>

        <label for="log12">Log ore 12</label>
        <textarea id="log12" rows="3"></textarea>

        <label for="log15">Log ore 15</label>
        <textarea id="log15" rows="3"></textarea>

        <label for="log18">Log ore 18</label>
        <textarea id="log18" rows="3"></textarea>

        <label for="log20">Log ore 20</label>
        <textarea id="log20" rows="3"></textarea>

        <button id="saveLiveConfigBtn" type="button">
          Salva configurazione live
        </button>

        <button id="saveArchiveBtn" type="button" style="margin-top:10px;background:#e6b800;color:black;">
          Salva giornata in archivio
        </button>

        <hr />

        <h2>Comandi utenti</h2>

        <button id="refreshBtn" type="button">Aggiorna comandi</button>
        <button id="logoutBtn" type="button">Esci</button>

        <div id="moderationList" class="commands-list"></div>
      </div>
    </section>

    <section class="actions">
      <a href="./">Torna al terminale</a>
      <a href="../live/">Vai alla live</a>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="./moderatore.js?v=5"></script>
</body>
</html>
