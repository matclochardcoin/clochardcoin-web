<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Moderatore Mat Clochard</title>
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div class="background-stars"></div>
  <div class="background-glow"></div>

  <main class="page">
    <header class="hero">
      <p class="domain">terminal.clochardcoin.it/moderatore</p>
      <h1>MODERATORE MAT</h1>
      <p class="subtitle">Approva o blocca i comandi prima che entrino nella live.</p>
    </header>

    <section class="terminal-card">
      <div class="terminal-top">
        <div class="dots"><span></span><span></span><span></span></div>
        <p>/mat_clochard/moderation_panel</p>
      </div>

      <div class="command-form" id="loginBox">
        <label for="adminPassword">Password moderatore</label>
        <input id="adminPassword" type="password" placeholder="Inserisci password" />

        <button id="loginBtn" type="button">Entra</button>

        <p class="local-note">
          Pannello riservato alla gestione dei comandi inviati dalla community.
        </p>
      </div>

      <div class="command-form hidden" id="moderationBox">
        <button id="refreshBtn" type="button">Aggiorna comandi</button>
        <button id="logoutBtn" type="button">Esci</button>

        <div id="moderationList" class="commands-list"></div>
      </div>
    </section>

    <section class="actions">
      <a href="./">Torna al terminale</a>
      <a href="../live/">Vai alla live</a>
    </section>
  </main>

  <div id="toast" class="toast"></div>

  <script src="./moderatore.js?v=2"></script>
</body>
</html>
